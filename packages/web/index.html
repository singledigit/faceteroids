<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MicroVM Asteroids</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #06060c;
        color: #cce;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #lobby { text-align: center; padding: 2rem; max-width: 28rem; }
      h1 { font-weight: 700; letter-spacing: 0.04em; }
      h2 { font-weight: 600; opacity: 0.9; }
      input, button, select {
        font-size: 1rem;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        border: 1px solid #334;
        background: #11131f;
        color: #cce;
        margin: 0.25rem;
      }
      button { background: #2a6; border-color: #2a6; cursor: pointer; font-weight: 600; }
      button:hover { background: #3b7; }
      .box { margin: 1rem 0; padding: 1rem; border: 1px solid #223; border-radius: 12px; }
      #game { display: none; }
      canvas {
        display: block; background: #0a0a12; border: 1px solid #223;
        max-width: 100vw; max-height: 100vh;
      }
      #status {
        display: none; margin-top: 1rem; background: #1a1d2e;
        padding: 0.5rem 1rem; border-radius: 8px;
      }
      /* Share banner: fixed at top so it stays visible during the game. */
      #share {
        display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        align-items: center; justify-content: center; gap: 0.5rem;
        padding: 0.6rem 1rem; background: #14233a; border-bottom: 1px solid #2a6;
        font-size: 0.9rem;
      }
      #share input {
        flex: 0 1 26rem; background: #0a0a12; border: 1px solid #2a6;
        padding: 0.4rem 0.6rem; border-radius: 6px; color: #cce;
      }
      #share button { padding: 0.4rem 0.8rem; margin: 0; }
      /* Host control bar: sits just under the share banner, over the game. */
      #hostbar {
        position: fixed; top: 3.1rem; left: 0; right: 0; z-index: 9;
        display: flex; align-items: center; justify-content: center; gap: 0.75rem;
        padding: 0.4rem; pointer-events: none;
      }
      #hostbar > * { pointer-events: auto; }
      #wait-msg {
        display: none; background: rgba(20,35,58,0.9); color: #cce;
        padding: 0.35rem 0.8rem; border-radius: 6px; font-size: 0.9rem;
      }
      #start-game { background: #2a6; border-color: #2a6; }
      #pause-game { background: #b80; border-color: #b80; }
      #end-game { background: #a33; border-color: #a33; }
      .hint { opacity: 0.6; font-size: 0.85rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    <div id="lobby">
      <h1>▲ MicroVM Asteroids</h1>
      <h2 id="flow-title"></h2>

      <div id="login-box" class="box" style="display:none">
        <p>Host login</p>
        <div><input id="username" placeholder="Username" autocomplete="username" /></div>
        <div><input id="password" type="password" placeholder="Password" autocomplete="current-password" /></div>
        <button id="login">Log in</button>
      </div>

      <div id="create-box" class="box" style="display:none">
        <p>Create a room</p>
        <div><input id="host-name" placeholder="Your name" maxlength="24" autocomplete="off" /></div>
        <div><select id="mode"></select></div>
        <button id="create">Create &amp; play</button>
      </div>

      <div id="join-box" class="box">
        <div><input id="name" placeholder="Your name" maxlength="24" autocomplete="off" /></div>
        <button id="play">Play</button>
      </div>

      <div id="status"></div>
      <p class="hint">Arrows / WASD to move &nbsp;·&nbsp; Space to fire</p>
    </div>

    <div id="share"></div>
    <div id="hostbar">
      <span id="wait-msg"></span>
      <button id="start-game" style="display:none">▶ Start game</button>
      <button id="pause-game" style="display:none">⏸ Pause</button>
      <button id="end-game" style="display:none">■ End game</button>
    </div>
    <div id="game"><canvas id="canvas"></canvas></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
